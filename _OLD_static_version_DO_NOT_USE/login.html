<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PW Study - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { display: flex; min-height: 100vh; background-color: #f1f5f9; color: #0f172a; }
        .auth-layout { display: flex; width: 100%; }
        .auth-left {
            flex: 1.2;
            background: linear-gradient(135deg, #eb3636 0%, #b91c1c 100%);
            color: white;
            padding: 80px 60px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }
        .auth-left::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 40%);
        }
        .brand { font-size: 28px; font-weight: 800; display: flex; align-items: center; gap: 12px; z-index: 10; position: relative; }
        .hero-text { z-index: 10; position: relative; max-width: 480px; }
        .hero-text h1 { font-size: 56px; font-weight: 800; line-height: 1.1; margin-bottom: 24px; letter-spacing: -1px; }
        .hero-text p { font-size: 18px; opacity: 0.9; line-height: 1.6; font-weight: 400; }
        
        .auth-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
            padding: 40px;
        }
        .auth-form-container { width: 100%; max-width: 460px; background: white; border: 1px solid #e2e8f0; padding: 48px; border-radius: 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.03); }
        .auth-card-icon { width: 64px; height: 64px; background: #fee2e2; color: #eb3636; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 32px; }
        .auth-title { font-size: 32px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
        .auth-subtitle { color: #64748b; margin-bottom: 36px; font-size: 16px; font-weight: 500; }
        
        .input-group { margin-bottom: 22px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; color: #334155; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 16px; }
        .input-group input {
            width: 100%; padding: 16px 16px 16px 48px;
            background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 14px;
            font-size: 15px; font-weight: 500; outline: none; transition: 0.2s ease-in-out; color: #0f172a;
        }
        .input-group input:focus { border-color: #eb3636; background: #fff; box-shadow: 0 0 0 4px #fee2e2; }
        
        .forgot-pass { display: block; text-align: right; font-size: 14px; font-weight: 600; color: #eb3636; text-decoration: none; margin-bottom: 28px; }
        .forgot-pass:hover { text-decoration: underline; }
        
        .btn-primary {
            width: 100%; padding: 18px; background: #eb3636; color: white; border: none; border-radius: 14px;
            font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; box-shadow: 0 6px 16px rgba(235,54,54,0.25); display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn-primary:hover { background: #dc2626; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(235,54,54,0.35); }
        
        .auth-footer { margin-top: 36px; text-align: center; color: #64748b; font-size: 15px; font-weight: 500; }
        .auth-footer a { color: #eb3636; font-weight: 700; text-decoration: none; }
        .auth-footer a:hover { text-decoration: underline; }
        
        @media (max-width: 960px) { .auth-left { display: none; } .auth-right { background: #f1f5f9; } .auth-form-container { background: white; border: none; } }
    </style>
</head>
<body>
    <div class="auth-layout">
        <div class="auth-left">
            <div class="brand"><i class="fa-solid fa-pen-nib"></i> PW Study</div>
            <div class="hero-text">
                <h1>Master your goals.</h1>
                <p>Join the premier learning platform designed to keep your studies organized, productive, and beautifully tracked.</p>
            </div>
            <div></div> <!-- Spacer -->
        </div>
        <div class="auth-right">
            <div class="auth-form-container">
                <div class="auth-card-icon"><i class="fa-solid fa-user-graduate"></i></div>
                <h2 class="auth-title">Welcome Back 👋</h2>
                <p class="auth-subtitle">Log in to track your study progress.</p>
                
                <form onsubmit="event.preventDefault(); window.location.href='index.html';">
                    <div class="input-group">
                        <label>Email Address</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-envelope"></i>
                            <input type="email" placeholder="student@example.com" required>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label>Password</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" placeholder="••••••••" required>
                        </div>
                    </div>
                    
                    <a href="#" class="forgot-pass">Forgot Password?</a>
                    
                    <button type="submit" class="btn-primary">
                        Log In to Dashboard <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </form>
                
                <div class="auth-footer">
                    Don't have an account? <a href="register.html">Sign up for free</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
